<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <title>Hand Frame Effect</title>
    <style>
  :root {
    --bg: #08090c;
    --panel: rgba(15, 16, 22, 0.6);
    --border: rgba(255, 255, 255, 0.08);
    --text: #eef0f4;
    --text-dim: #9aa0ac;
    --accent: #62f5c7;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    color: var(--text);
  }

  #stage {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(120% 120% at 50% 0%, #14161d 0%, #08090c 60%);
  }

  video { display: none; }

  canvas#view {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ---------- Top bar ---------- */
  .topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: max(16px, env(safe-area-inset-top)) 18px 14px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
    z-index: 10;
    pointer-events: none;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 13px;
    letter-spacing: 0.14em;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .brand .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }

  .badge {
    pointer-events: auto;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px 8px 10px;
    border-radius: 999px;
    background: var(--panel);
    border: 1px solid var(--border);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    transition: box-shadow 0.25s ease;
  }
  .badge .ring {
    width: 26px; height: 26px;
    flex-shrink: 0;
  }
  .badge .label {
    font-size: 13.5px;
    font-weight: 600;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  /* ---------- Center hint ---------- */
  .hint {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    padding: 22px 26px;
    border-radius: 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    z-index: 8;
    max-width: min(84vw, 380px);
    transition: opacity 0.35s ease;
  }
  .hint .icon {
    font-size: 30px;
    margin-bottom: 10px;
    opacity: 0.9;
  }
  .hint .title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .hint .sub {
    font-size: 12.5px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  /* ---------- Bottom controls ---------- */
  .bottombar {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 16px 18px max(18px, env(safe-area-inset-bottom));
    background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
    z-index: 10;
  }

  .ctrl-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--panel);
    border: 1px solid var(--border);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.2s ease;
  }
  .ctrl-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.12); }

  .effect-name-pill {
    position: absolute;
    bottom: 96px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    z-index: 9;
    pointer-events: none;
    text-align: center;
  }

  .permission-screen {
    position: absolute;
    inset: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 24px;
    text-align: center;
    background: var(--bg);
  }
  .permission-screen .icon { font-size: 44px; }
  .permission-screen h1 { font-size: 18px; margin: 0; }
  .permission-screen p { font-size: 13px; color: var(--text-dim); max-width: 320px; line-height: 1.6; margin: 0; }
  .permission-screen button {
    margin-top: 6px;
    padding: 12px 26px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--accent);
    color: #06110d;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }
  .permission-screen.hidden { display: none; }
  .error-text { color: #ff7a7a; font-size: 12.5px; margin-top: 8px; }
</style>
  </head>
  <body>

    <div id="stage">
      <video id="video" playsinline muted></video>
      <canvas id="view"></canvas>

      <div class="topbar">
        <div class="brand"><span class="dot"></span> Hand Frame</div>
        <div class="badge" id="badge">
          <svg class="ring" id="ring" viewBox="0 0 36 36">
            <circle cx="18" cy="18" r="15" fill="none"
              stroke="rgba(255,255,255,0.15)" stroke-width="3"></circle>
            <circle id="ringProgress" cx="18" cy="18" r="15" fill="none"
              stroke="#62f5c7" stroke-width="3"
              stroke-linecap="round" stroke-dasharray="94.2"
              stroke-dashoffset="94.2"
              transform="rotate(-90 18 18)"></circle>
          </svg>
          <span class="label" id="effectLabel">—</span>
        </div>
      </div>

      <div class="hint" id="hint">
        <div class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="32"
            height="32" viewBox="0 0 32 32">
            <path d="M0 0h32v32H0z" fill="none" />
            <path fill="currentColor"
              d="M29.71 13.72h1.53v6.09h-1.53Zm-1.52 6.09h1.52v4.58h-1.52Zm0-7.62h1.52v1.53h-1.52Zm-1.52 15.24H12.95v-3.04h-1.52v3.04H9.9V32h19.81v-4.57h-1.52v-3.04h-1.52Zm0 3.05h-3.05v-1.52h3.05Zm0-19.81h1.52v1.52h-1.52Zm-1.53 3.05h1.53v3.05h-1.53Zm-4.57 0h1.53v3.05h-1.53Zm-4.57 0h1.52v3.05H16Zm0-3.05h10.67V9.15h-9.15V1.53H16zM12.95 0H16v1.53h-3.05ZM9.9 21.34h1.53v3.05H9.9Zm1.53-6.1v3.05h1.52V1.53h-1.52v12.19H9.9v1.52zm-3.05 4.57H9.9v1.53H8.38Zm0-7.62H9.9v1.53H8.38Zm0-7.61H9.9V0H5.33v1.53h1.53v1.52h1.52zM6.86 18.29h1.52v1.52H6.86Zm-1.53-7.62h3.05v1.52H5.33Zm0 6.1h1.53v1.52H5.33Z" />
            <path fill="currentColor"
              d="M5.33 3.05h1.53v1.53H5.33Zm-1.52 9.14h1.52v4.58H3.81Zm1.52-4.57H3.81V6.1H2.29V4.58H.76v4.57h4.57zM3.81 4.58h1.52V6.1H3.81Z" />
          </svg>
        </div>
        <div class="title">Show 2 hands</div>
        <div class="sub">Thumb and forefinger shape like framing a photo</div>
      </div>

      <div class="effect-name-pill" id="hintPill" style="display:none">Efek
        berganti tiap 1 detik</div>

      <div id="handCounter"
        style="position:absolute; top:74px; left:18px; z-index:9; font-size:11.5px; font-family:monospace; color:#9aa0ac; background:rgba(15,16,22,0.6); padding:6px 10px; border-radius:8px; border:1px solid rgba(255,255,255,0.08);">
        Hand Detected : 0</div>

      <div class="bottombar">
        <div class="ctrl-btn" id="btnFlip" title="Ganti kamera">⟲</div>
        <div class="ctrl-btn" id="btnFullscreen" title="Fullscreen">⛶</div>
      </div>

    </div>

    <div class="permission-screen" id="permissionScreen">
      <div class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="30"
          height="30" viewBox="0 0 20 20">
          <path d="M0 0h20v20H0z" fill="none" />
          <path fill="currentColor"
            d="M10 6a4 4 0 1 0 0 8a4 4 0 0 0 0-8m-3 4a3 3 0 1 1 6 0a3 3 0 0 1-6 0m1.124-8a1.5 1.5 0 0 0-1.34.826L6.194 4h-1.69a2.5 2.5 0 0 0-2.5 2.5v8a2.5 2.5 0 0 0 2.5 2.5h11a2.5 2.5 0 0 0 2.5-2.5v-8a2.5 2.5 0 0 0-2.5-2.5h-1.69l-.584-1.17A1.5 1.5 0 0 0 11.888 2zm-.447 1.275A.5.5 0 0 1 8.124 3h3.764a.5.5 0 0 1 .448.276l.723 1.447a.5.5 0 0 0 .447.276h1.999a1.5 1.5 0 0 1 1.5 1.5V14.5a1.5 1.5 0 0 1-1.5 1.5h-11a1.5 1.5 0 0 1-1.5-1.5v-8a1.5 1.5 0 0 1 1.5-1.5h1.998a.5.5 0 0 0 .446-.276z" />
        </svg>
      </div>
      <h1>Allow camera access</h1>
      <p>This app needs a camera to detect your hand directly. All processed in
        your own browser, no video is sent to any server.</p>
      <button id="btnStart">Mulai kamera</button>
      <div class="error-text" id="errorText"></div>
    </div>

    <script type="module">
import {
  HandLandmarker,
  FilesetResolver,
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const video = document.getElementById("video");
const canvas = document.getElementById("view");
const ctx = canvas.getContext("2d");
const hint = document.getElementById("hint");
const hintPill = document.getElementById("hintPill");
const effectLabel = document.getElementById("effectLabel");
const ringProgress = document.getElementById("ringProgress");
const permissionScreen = document.getElementById("permissionScreen");
const btnStart = document.getElementById("btnStart");
const btnFlip = document.getElementById("btnFlip");
const btnFullscreen = document.getElementById("btnFullscreen");
const errorText = document.getElementById("errorText");
const debugBanner = document.getElementById("debugBanner");
const handCounter = document.getElementById("handCounter");

function showDebugError(context, err) {
  const msg = (err && err.message) ? err.message : String(err);
  console.error(context, err);
}

function showDebugInfo(msg) {
  console.log(msg);
}

// GRACE PERIOD: kalau 2 tangan sempat kedeteksi, tetap dianggap "lengkap"
// selama beberapa ratus ms walau 1 frame tiba-tiba cuma kebaca 1/0 tangan.
// Ini biar bentuknya gak flicker terus pas tangan goyang dikit.
const HAND_GRACE_MS = 450;
let lastTwoHandsAt = 0;
let lastFramePts = null;
let lastLogAt = 0;

const THUMB_TIP = 4;
const INDEX_TIP = 8;
const EFFECT_DURATION = 1000; // ms
const RING_CIRC = 94.2;

// Setiap efek didefinisikan sebagai CSS filter string yang dipakai
// hanya di area DALAM bentuk yang dibuat 4 titik jari (lewat clip path).
const EFFECTS = [
  { name: "Thermal",   color: "#ff5c5c", filter: "hue-rotate(180deg) saturate(4) contrast(1.2)" },
  { name: "Hot",       color: "#ff9d3f", filter: "sepia(1) hue-rotate(-15deg) saturate(3) brightness(1.1)" },
  { name: "Ocean",     color: "#3fb8ff", filter: "hue-rotate(150deg) saturate(2.4) contrast(1.1)" },
  { name: "Dream Pink",color: "#ff8fe0", filter: "hue-rotate(300deg) saturate(2.6) brightness(1.05)" },
  { name: "Invert",    color: "#ffffff", filter: "invert(1)" },
  { name: "Grayscale", color: "#c7c7c7", filter: "grayscale(1) contrast(1.15)" },
  { name: "Neon Edge", color: "#7dffb0", filter: "grayscale(1) invert(1) contrast(3)" },
  { name: "Pixelate",  color: "#ffd93f", filter: "none", pixelate: true },
];

let effectIdx = 0;
let effectStart = performance.now();
let facingMode = "user";
let handLandmarker = null;
let lastVideoTime = -1;
let stream = null;

function setEffectUI(name, color) {
  effectLabel.textContent = name;
  ringProgress.setAttribute("stroke", color);
}

function updateRing(progress) {
  const offset = RING_CIRC * (1 - progress);
  ringProgress.setAttribute("stroke-dashoffset", offset.toFixed(2));
}

// ---------- Convex hull (monotone chain) ----------
function cross(o, a, b) {
  return (a[0]-o[0])*(b[1]-o[1]) - (a[1]-o[1])*(b[0]-o[0]);
}
function convexHull(points) {
  const pts = points.slice().sort((a,b) => a[0]-b[0] || a[1]-b[1]);
  if (pts.length < 3) return pts;
  const lower = [];
  for (const p of pts) {
    while (lower.length >= 2 && cross(lower[lower.length-2], lower[lower.length-1], p) <= 0) lower.pop();
    lower.push(p);
  }
  const upper = [];
  for (let i = pts.length - 1; i >= 0; i--) {
    const p = pts[i];
    while (upper.length >= 2 && cross(upper[upper.length-2], upper[upper.length-1], p) <= 0) upper.pop();
    upper.push(p);
  }
  upper.pop(); lower.pop();
  return lower.concat(upper);
}

// ---------- Cover-fit transform (biar full-bleed di semua device) ----------
function getCoverTransform(vw, vh, cw, ch) {
  const scale = Math.max(cw / vw, ch / vh);
  const drawW = vw * scale;
  const drawH = vh * scale;
  const offsetX = (cw - drawW) / 2;
  const offsetY = (ch - drawH) / 2;
  return { scale, drawW, drawH, offsetX, offsetY };
}

function resizeCanvas() {
  canvas.width = window.innerWidth * window.devicePixelRatio;
  canvas.height = window.innerHeight * window.devicePixelRatio;
  canvas.style.width = window.innerWidth + "px";
  canvas.style.height = window.innerHeight + "px";
}
window.addEventListener("resize", resizeCanvas);

async function startCamera() {
  try {
    errorText.textContent = "";
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
    video.srcObject = stream;
    await video.play();
    permissionScreen.classList.add("hidden");
    resizeCanvas();
    requestAnimationFrame(renderLoop);
  } catch (err) {
    showDebugError("startCamera", err);
    errorText.textContent = "Gagal akses kamera: " + err.message + " (pastikan izin kamera diaktifkan di browser)";
  }
}

async function initModel() {
  try {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath:
          "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "GPU",
      },
      numHands: 2,
      runningMode: "VIDEO",
      minHandDetectionConfidence: 0.5,
      minHandPresenceConfidence: 0.5,
      minTrackingConfidence: 0.5,
    });
    showDebugInfo("Model berhasil dimuat ✓ (delegate: GPU)");
  } catch (err) {
    showDebugError("initModel", err);
    errorText.textContent = "Gagal load model deteksi tangan: " + (err.message || err);
    throw err;
  }
}

function drawDot(x, y, color) {
  ctx.beginPath();
  ctx.arc(x, y, 8 * window.devicePixelRatio, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(10,10,14,0.9)";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x, y, 6.2 * window.devicePixelRatio, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.lineWidth = 1.2 * window.devicePixelRatio;
  ctx.strokeStyle = "rgba(255,255,255,0.85)";
  ctx.stroke();
}

function pixelateRegion(hullPx) {
  // ambil bounding box hull, downscale, upscale -> efek pixelate hanya di area itu
  const xs = hullPx.map(p => p[0]);
  const ys = hullPx.map(p => p[1]);
  const minX = Math.max(0, Math.min(...xs));
  const minY = Math.max(0, Math.min(...ys));
  const maxX = Math.min(canvas.width, Math.max(...xs));
  const maxY = Math.min(canvas.height, Math.max(...ys));
  const bw = Math.max(1, maxX - minX);
  const bh = Math.max(1, maxY - minY);

  const small = document.createElement("canvas");
  const factor = 24;
  small.width = Math.max(1, Math.floor(bw / factor));
  small.height = Math.max(1, Math.floor(bh / factor));
  const sctx = small.getContext("2d");
  sctx.drawImage(canvas, minX, minY, bw, bh, 0, 0, small.width, small.height);

  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(small, 0, 0, small.width, small.height, minX, minY, bw, bh);
  ctx.imageSmoothingEnabled = true;
}

function renderLoop() {
  if (video.readyState >= 2 && handLandmarker) {
    const now = performance.now();

    if (video.currentTime !== lastVideoTime) {
      lastVideoTime = video.currentTime;
      try {
        const result = handLandmarker.detectForVideo(video, now);
        draw(result, now);
      } catch (err) {
        showDebugError("detectForVideo", err);
      }
    }
  }
  requestAnimationFrame(renderLoop);
}

function draw(result, now) {
  const cw = canvas.width, ch = canvas.height;
  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw || !vh) return;

  const { drawW, drawH, offsetX, offsetY } = getCoverTransform(vw, vh, cw, ch);

  // ganti efek tiap 1 detik
  const elapsed = now - effectStart;
  if (elapsed >= EFFECT_DURATION) {
    effectIdx = (effectIdx + 1) % EFFECTS.length;
    effectStart = now;
  }
  const progress = Math.min(1, (now - effectStart) / EFFECT_DURATION);
  const effect = EFFECTS[effectIdx];
  setEffectUI(effect.name, effect.color);
  updateRing(progress);

  // 1) gambar video normal, mirrored (mode selfie), full-bleed cover
  ctx.save();
  ctx.filter = "none";
  ctx.translate(cw, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(video, offsetX, offsetY, drawW, drawH);
  ctx.restore();

  const hands = result.landmarks || [];
  if (now - lastLogAt > 1000) {
    console.log(`[detect] hands.length = ${hands.length}, video ${vw}x${vh}, handednesses:`, result.handednesses);
    lastLogAt = now;
  }
  if (handCounter) {
    handCounter.textContent = `Tangan terdeteksi: ${hands.length} / 2`;
    handCounter.style.color = hands.length === 2 ? "#62f5c7" : "#9aa0ac";
  }
  let framePts = null;
  const allPts = [];

  for (const lm of hands) {
    const thumb = lm[THUMB_TIP];
    const index = lm[INDEX_TIP];
    for (const pt of [thumb, index]) {
      const nxMirrored = 1 - pt.x;
      const px = offsetX + nxMirrored * drawW;
      const py = offsetY + pt.y * drawH;
      allPts.push([px, py]);
    }
  }

  if (hands.length === 2) {
    framePts = allPts;
    lastFramePts = allPts;
    lastTwoHandsAt = now;
  } else if (now - lastTwoHandsAt < HAND_GRACE_MS && lastFramePts) {
    // masih dalam masa toleransi, pakai posisi terakhir yang valid
    framePts = lastFramePts;
  }

  if (framePts) {
    if (hint) hint.style.opacity = "0";
    hintPill.style.display = "block";

    const hull = convexHull(framePts);

    // 2) gambar ulang video dengan filter efek, diclip ke bentuk hull
    ctx.save();
    ctx.beginPath();
    hull.forEach(([x, y], i) => (i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y)));
    ctx.closePath();
    ctx.clip();

    if (effect.pixelate) {
      pixelateRegion(hull);
    } else {
      ctx.filter = effect.filter;
      ctx.translate(cw, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, offsetX, offsetY, drawW, drawH);
    }
    ctx.restore();

    // 3) outline glow
    ctx.save();
    ctx.beginPath();
    hull.forEach(([x, y], i) => (i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y)));
    ctx.closePath();
    ctx.lineWidth = 6 * window.devicePixelRatio;
    ctx.strokeStyle = "rgba(0,0,0,0.55)";
    ctx.stroke();
    ctx.lineWidth = 2.4 * window.devicePixelRatio;
    ctx.strokeStyle = effect.color;
    ctx.shadowColor = effect.color;
    ctx.shadowBlur = 14 * window.devicePixelRatio;
    ctx.stroke();
    ctx.restore();
  } else {
    if (hint) hint.style.opacity = "1";
    hintPill.style.display = "none";
  }

  // 4) titik landmark jempol/telunjuk
  allPts.forEach(([x, y], i) => {
    drawDot(x, y, i % 2 === 0 ? "#62f5c7" : "#ffd93f");
  });
}

btnStart.addEventListener("click", async () => {
  try {
    await initModel();
    await startCamera();
  } catch (err) {
    showDebugError("btnStart", err);
  }
});

btnFlip.addEventListener("click", async () => {
  facingMode = facingMode === "user" ? "environment" : "user";
  try {
    await startCamera();
  } catch (err) {
    showDebugError("btnFlip", err);
  }
});

btnFullscreen.addEventListener("click", () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
});

resizeCanvas();
</script>
  </body>
</html>
